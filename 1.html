<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rubik's Cube Scramble</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom style for Inter font -->
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Ensure twisty-player takes up available space and maintains aspect ratio */
        twisty-player {
            width: 100%;
            height: 300px; /* Default height for both 2D/3D */
            display: block;
            margin: auto; /* Center the player */
            border-radius: 0.75rem; /* rounded-lg */
            overflow: hidden; /* Ensure content respects border-radius */
        }
    </style>
</head>
<body class="bg-gradient-to-br from-purple-600 to-indigo-800 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-xl shadow-2xl max-w-md w-full text-center transform hover:scale-105 transition-transform duration-300">
        <h1 class="text-4xl font-extrabold text-gray-900 mb-6 tracking-tight">
            Rubik's Cube Scramble
        </h1>
        <p class="text-lg text-gray-600 mb-8">
            Here's a random 3x3 scramble and its visual representation:
        </p>

        <!-- Scramble Notation Display -->
        <div id="scrambleDisplay" class="bg-gray-100 p-6 rounded-lg border-2 border-dashed border-gray-300 mb-6 transition-all duration-300 ease-in-out hover:border-indigo-500 min-h-[80px] flex items-center justify-center">
            <p class="text-3xl font-mono text-gray-800 tracking-wide break-words">Loading scramble...</p>
        </div>

        <!-- Scramble Visualization using Twisty Player -->
        <div id="twistyPlayerContainer" class="relative bg-gray-100 p-4 rounded-lg border-2 border-dashed border-gray-300 mb-8 flex items-center justify-center min-h-[350px] overflow-hidden">
            <twisty-player
                id="cubePlayer"
                alg=""
                hint-facelets="none"
                background="none"
                visualization="2D" <!-- Default to 2D -->
                control-panel="none" <!-- Disable playback controls -->
                interaction-mode="none" <!-- Disable user interaction (no rewinding/rotating) -->
            ></twisty-player>
            <!-- A loading overlay for the cube player, hidden by default -->
            <div id="cubeLoader" class="absolute inset-0 flex items-center justify-center bg-gray-200 bg-opacity-75 text-gray-700 text-lg font-semibold hidden rounded-lg">
                Loading Cube...
            </div>
        </div>

        <!-- Visualization Mode Buttons -->
        <div class="flex justify-center space-x-4 mb-8">
            <button id="show2DBtn" class="bg-blue-500 text-white py-2 px-5 rounded-full text-md font-semibold shadow-md hover:bg-blue-600 focus:outline-none focus:ring-4 focus:ring-blue-300 transition-all duration-200 ease-in-out">
                Show 2D
            </button>
            <button id="show3DBtn" class="bg-green-500 text-white py-2 px-5 rounded-full text-md font-semibold shadow-md hover:bg-green-600 focus:outline-none focus:ring-4 focus:ring-green-300 transition-all duration-200 ease-in-out">
                Show 3D
            </button>
        </div>

        <!-- Generate Scramble Button -->
        <button id="generateScrambleBtn" class="bg-indigo-600 text-white py-3 px-6 rounded-full text-lg font-semibold shadow-lg hover:bg-indigo-700 focus:outline-none focus:ring-4 focus:ring-indigo-500 focus:ring-opacity-50 transition-all duration-300 ease-in-out transform hover:-translate-y-1">
            Generate New Scramble
        </button>
    </div>

    <script type="module">
        // Import scramble generation and twisty-player from cubing.net
        import { randomScrambleForEvent } from "https://cdn.cubing.net/v0/js/cubing/scramble";
        import "https://cdn.cubing.net/v0/js/cubing/twisty"; // Import the twisty-player web component

        // Get display elements and buttons
        const scrambleDisplay = document.getElementById("scrambleDisplay").querySelector("p");
        const cubePlayer = document.getElementById("cubePlayer");
        const cubeLoader = document.getElementById("cubeLoader");
        const generateScrambleBtn = document.getElementById("generateScrambleBtn");
        const show2DBtn = document.getElementById("show2DBtn");
        const show3DBtn = document.getElementById("show3DBtn");

        let currentScramble = ""; // Store the current scramble string

        /**
         * Updates the twisty-player's visualization mode.
         * @param {string} mode - "2D" or "3D"
         */
        function updateVisualization(mode) {
            cubePlayer.visualization = mode;
            // Re-apply the current scramble to ensure the player updates
            if (currentScramble) {
                cubePlayer.alg = currentScramble;
            }
        }

        /**
         * Generates and displays a new 3x3 Rubik's Cube scramble and its image.
         * Handles potential errors during scramble generation.
         */
        async function generateAndDisplayScramble() {
            // Reset and show loading states
            scrambleDisplay.textContent = "Generating scramble...";
            cubePlayer.alg = ""; // Clear previous scramble
            cubeLoader.classList.remove('hidden'); // Show cube loader
            generateScrambleBtn.disabled = true; // Disable button while loading
            show2DBtn.disabled = true; // Disable mode buttons
            show3DBtn.disabled = true; // Disable mode buttons

            try {
                // 1. Generate scramble notation
                const scramble = await randomScrambleForEvent("333");
                currentScramble = scramble.toString(); // Store the generated scramble
                scrambleDisplay.textContent = currentScramble;

                // 2. Set the scramble on the twisty-player to visualize the cube
                cubePlayer.alg = currentScramble;

                // cubing.js player loads asynchronously, hide loader after a small delay
                setTimeout(() => {
                    cubeLoader.classList.add('hidden'); // Hide cube loader
                }, 500);

            } catch (error) {
                // Display error message if scramble generation fails
                console.error("Failed to generate scramble:", error);
                scrambleDisplay.textContent = "Error: Could not generate scramble.";
                cubePlayer.alg = ""; // Clear player on error
            } finally {
                generateScrambleBtn.disabled = false; // Re-enable button
                show2DBtn.disabled = false; // Re-enable mode buttons
                show3DBtn.disabled = false; // Re-enable mode buttons
            }
        }

        // Generate a scramble when the page loads
        window.onload = generateAndDisplayScramble;

        // Add event listeners for buttons
        generateScrambleBtn.addEventListener("click", generateAndDisplayScramble);
        show2DBtn.addEventListener("click", () => updateVisualization("2D"));
        show3DBtn.addEventListener("click", () => updateVisualization("3D"));
    </script>
</body>
</html>
