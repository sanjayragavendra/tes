<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Hoodieboy Timer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script type="importmap">
        {
            "imports": {
                "cubing/scramble": "https://cdn.cubing.net/v0/js/cubing/scramble",
                "cubing/twisty": "https://cdn.cubing.net/v0/js/cubing/twisty"
            }
        }
    </script>
    <script type="module">
        import "cubing/twisty";
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto Mono', monospace; color: white; text-shadow: 0 0 8px rgba(0,255,255,0.7); background-color: #0c0a15; overflow: hidden; }
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .panel { background: rgba(17,24,39,0.75); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; }

        /* Timer states */
        .timer-inspecting { color: #67E8F9; text-shadow: 0 0 15px #67E8F9; }
        .timer-ready      { color: #34D399; text-shadow: 0 0 15px #34D399; }
        .timer-running    { color: #F87171; text-shadow: 0 0 20px #F87171; }
        .timer-penalty    { color: #FBBF24; text-shadow: 0 0 15px #FBBF24; }
        .timer-display    { font-family: 'Orbitron', sans-serif; font-size: clamp(2.5rem,12vw,8rem); transition: color .3s, text-shadow .3s; }

        /* Typing mode styles */
        .typing-mode-input {
            background: rgba(0,0,0,0.5);
            border: 2px solid #67E8F9;
            border-radius: 12px;
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            text-align: center;
            color: #67E8F9;
            outline: none;
            width: 200px;
            padding: 10px;
        }
        
        .typing-mode-input:focus { box-shadow: 0 0 20px rgba(103,232,249,0.5); }

        /* Animations */
        .inspection-tick { animation: ipulse .5s ease-in-out; }
        @keyframes ipulse { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

        .scramble-text { font-size: clamp(.9rem,2.5vw,1.4rem); transition: opacity .5s, transform .5s; min-height: 40px; line-height: 1.6; word-break: break-all; }
        .history-table tr:hover { background: rgba(255,255,255,.05); }
        .custom-select { background: rgba(31,41,55,.7); color: #d1d5db; border: 1px solid rgba(255,255,255,.2); }

        /* Scramble visualizer */
        #puzzle-visualization {
            margin: .75rem auto 0;
            opacity: 1;
            display: flex;
            justify-content: center;
            min-height: 280px;
            align-items: center;
        }
        twisty-player {
            width: 100%;
            max-width: 400px;
            height: auto;
            min-height: 280px;
            --background: transparent;
        }

        /* Focus / Layout transitions */
        #left-column, #stats-panel, #contact-me-box { transition: opacity .4s, transform .4s; }
        #timer-container { transition: all .5s; }
        body.focus-mode #left-column    { opacity:0; transform:translateX(-100%); pointer-events:none; }
        body.focus-mode #stats-panel    { opacity:0; transform:scale(.9);         pointer-events:none; }
        body.focus-mode #timer-container {
            position:fixed;
            top:0; left:0; width:100vw; height:100vh;
            z-index:100; margin:0; padding:0; flex-grow:1;
            background:rgba(12,10,21,.25);
        }
        body.focus-mode #timer { font-size: clamp(5rem,25vw,18rem); }

        /* ── SETTINGS MODAL ── */
        #settings-modal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,.75);
            display: flex; align-items: center; justify-content: center;
            padding: 1rem; z-index: 200;
            opacity: 0; pointer-events: none; transition: opacity .3s;
        }
        #settings-modal.open { opacity: 1; pointer-events: all; }
        #settings-modal .modal-box {
            background: rgba(15,20,35,.95); border: 1px solid rgba(103,232,249,.25);
            border-radius: 1.25rem; padding: 2rem; width: 100%; max-width: 420px;
            box-shadow: 0 0 40px rgba(103,232,249,.15); transform: scale(.94); transition: transform .3s;
        }
        #settings-modal.open .modal-box { transform: scale(1); }

        .toggle-track { width: 44px; height: 24px; background: rgba(255,255,255,.15); border-radius: 12px; position: relative; cursor: pointer; transition: background .25s; }
        .toggle-track.on { background: rgba(52,211,153,.5); border-color: #34D399; }
        .toggle-knob { position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; background: white; border-radius: 50%; transition: left .25s; }
        .toggle-track.on .toggle-knob { left: 22px; }

        /* Settings button */
        #settings-btn { position: fixed; top: 1rem; right: 1rem; z-index: 150; width: 38px; height: 38px; background: rgba(17,24,39,.8); border: 1px solid rgba(255,255,255,.15); border-radius: .6rem; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<button id="settings-btn" title="Settings">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="rgba(103,232,249,0.85)" viewBox="0 0 16 16">
        <path d="M8 4.754a3.246 3.246 0 1 0 0 6.492 3.246 3.246 0 0 0 0-6.492zM5.754 8a2.246 2.246 0 1 1 4.492 0 2.246 2.246 0 0 1-4.492 0z"/>
        <path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 0 1-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 0 1-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 0 1 .52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 0 1 1.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 0 1 1.255-.52l.292.16c1.64.893 3.434-.902 2.54-2.541l-.159-.292a.873.873 0 0 1 .52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 0 1-.52-1.255l.16-.292c.893-1.64-.902-3.433-2.541-2.54l-.292.159a.873.873 0 0 1-1.255-.52l-.094-.319zm-2.633.283c.246-.835 1.428-.835 1.674 0l.094.319a1.873 1.873 0 0 0 2.693 1.115l.291-.16c.764-.415 1.6.42 1.184 1.185l-.159.292a1.873 1.873 0 0 0 1.116 2.692l.318.094c.835.246.835 1.428 0 1.674l-.319.094a1.873 1.873 0 0 0-1.115 2.693l.16.291c.415.764-.42 1.6-1.185 1.184l-.291-.159a1.873 1.873 0 0 0-2.693 1.116l-.094.318c-.246.835-1.428.835-1.674 0l-.094-.319a1.873 1.873 0 0 0-2.692-1.115l-.292.16c-.764.415-1.6-.42-1.184-1.185l.159-.291A1.873 1.873 0 0 0 1.945 8.93l-.319-.094c-.835-.246-.835-1.428 0-1.674l.319-.094A1.873 1.873 0 0 0 3.06 4.377l-.16-.292c-.415-.764.42-1.6 1.185-1.184l.292.159a1.873 1.873 0 0 0 2.692-1.115l.094-.319z"/>
    </svg>
</button>

<div id="settings-modal">
    <div class="modal-box">
        <h2 class="text-xl font-bold text-cyan-300 mb-5 text-center" style="font-family:'Orbitron',sans-serif;">⚙ Settings</h2>
        <div class="settings-row">
            <div>
                <div class="settings-label">Inspection Time</div>
                <div class="settings-desc">15-second WCA inspection before solve</div>
            </div>
            <div id="toggle-inspection" class="toggle-track on"><div class="toggle-knob"></div></div>
        </div>
        <div class="settings-row">
            <div>
                <div class="settings-label">Timer Mode</div>
                <div class="settings-desc">How to record times</div>
            </div>
            <select id="timer-mode-select" class="custom-select rounded-md px-2 py-1">
                <option value="default">Default (Spacebar/Tap)</option>
                <option value="typing">Typing (Manual Input)</option>
                <option value="bluetooth">Bluetooth (GAN Timer)</option>
            </select>
        </div>
        <button id="close-settings-btn" class="w-full mt-6 py-2 rounded-lg font-bold text-sm bg-cyan-600 hover:bg-cyan-700 text-white">Close</button>
    </div>
</div>

<div class="relative w-full h-screen flex flex-col md:flex-row p-2 sm:p-4 gap-4 z-10">

    <div id="left-column" class="w-full md:w-1/2 lg:w-1/3 flex flex-col gap-4">

        <div id="scramble-panel" class="panel p-4 shadow-lg">
            <div class="flex justify-center items-center mb-2 gap-4">
                <h2 class="text-center text-lg sm:text-xl text-cyan-300">Event</h2>
                <select id="event-selector" class="custom-select rounded-md px-2 py-1 focus:outline-none focus:ring-2 focus:ring-cyan-400"></select>
            </div>
            <p id="scramble" class="scramble-text text-center font-bold">Generating scramble…</p>
            <div id="puzzle-visualization"></div>
        </div>

        <div id="history-panel" class="panel p-4 shadow-lg flex-1 flex flex-col min-h-0">
            <h2 class="text-center text-lg sm:text-xl text-cyan-300 mb-2 flex-shrink-0">History</h2>
            <div id="history-scroll-container" class="overflow-y-auto flex-grow">
                <table class="w-full text-center text-sm sm:text-base history-table">
                    <thead class="sticky top-0 bg-gray-800/80">
                        <tr>
                            <th class="p-2">#</th>
                            <th class="p-2">Time</th>
                            <th class="p-2">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="history-body"></tbody>
                 </table>
            </div>
        </div>
    </div>

    <div id="right-column" class="w-full md:w-1/2 lg:w-2/3 flex flex-col gap-4">

        <div id="timer-container" class="panel flex-1 flex items-center justify-center cursor-pointer">
            <div id="timer-display-wrapper" style="text-align: center;">
                <h1 id="timer" class="timer-display font-black tracking-tighter">0.00</h1>
                <input type="text" id="typing-mode-input" class="typing-mode-input" placeholder="Enter time" style="display: none;">
            </div>
        </div>

        <div id="stats-panel" class="panel p-4 shadow-lg flex flex-col sm:flex-row justify-around items-center">
            <div class="text-center">
                <h2 class="text-lg sm:text-xl text-cyan-300 mb-2">Stats</h2>
                <div class="grid grid-cols-2 gap-x-4">
                    <p>Ao5:  <span id="ao5"   class="font-bold">N/A</span></p>
                    <p>Ao12: <span id="ao12"  class="font-bold">N/A</span></p>
                    <p>Best: <span id="best"  class="font-bold">N/A</span></p>
                    <p>Worst:<span id="worst" class="font-bold">N/A</span></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script type="module">
    import { randomScrambleForEvent } from 'cubing/scramble';

    // UI ELEMENTS
    const timerEl = document.getElementById('timer');
    const scrambleEl = document.getElementById('scramble');
    const eventSel = document.getElementById('event-selector');
    const timerContainer = document.getElementById('timer-container');
    const visualizerEl = document.getElementById('puzzle-visualization');
    const timerModeSelect = document.getElementById('timer-mode-select');
    const typingInput = document.getElementById('typing-mode-input');
    const settingsBtn = document.getElementById('settings-btn');
    const settingsModal = document.getElementById('settings-modal');
    const closeSettingsBtn = document.getElementById('close-settings-btn');
    const toggleInspection = document.getElementById('toggle-inspection');

    // TIMER STATE
    let times = [];
    let currentEvent = "333";
    let timerMode = "default"; // 'default' or 'typing'
    let timerInterval = null;
    let startHoldTime = 0;
    let isHolding = false;
    let isRunning = false;
    let inInspection = false;
    let solveStartTime = 0;
    let inspectionInterval = null;
    let inspectionRemaining = 15;
    let useInspection = true;

    const WCA_EVENTS = {
        "333": "3x3x3", "222": "2x2x2", "444": "4x4x4", "555": "5x5x5",
        "666": "6x6x6", "777": "7x7x7", "333oh": "3x3 OH", "sq1": "Square-1",
        "pyram": "Pyraminx", "minx": "Megaminx", "skewb": "Skewb"
    };

    // Populate Events
    Object.keys(WCA_EVENTS).forEach(k => {
        const opt = document.createElement('option');
        opt.value = k; opt.textContent = WCA_EVENTS[k];
        eventSel.appendChild(opt);
    });

    // WCA Scramble & Visualization Fix
    async function generateScramble() {
        scrambleEl.style.opacity = 0;
        try {
            const sc = await randomScrambleForEvent(currentEvent);
            scrambleEl.textContent = sc.toString();
            scrambleEl.style.opacity = 1;

            // Render twisty visualizer
            visualizerEl.innerHTML = '';
            const player = document.createElement('twisty-player');
            player.setAttribute('puzzle', currentEvent === "333oh" ? "333" : currentEvent);
            player.setAttribute('alg', sc.toString());
            player.setAttribute('control-panel', 'none');
            player.setAttribute('background', 'none');
            visualizerEl.appendChild(player);
        } catch (e) {
            scrambleEl.textContent = "Error loading scramble. Check connection.";
            scrambleEl.style.opacity = 1;
        }
    }

    // Baseline Timer Handlers (Restored Classic Behaviour)
    function onDown() {
        if (timerMode !== 'default' || inInspection) return;
        if (isRunning) {
            stopTimer();
            return;
        }
        if (!isHolding) {
            isHolding = true;
            timerEl.classList.add('timer-ready');
            startHoldTime = Date.now();
        }
    }

    function onUp() {
        if (timerMode !== 'default') return;
        if (isHolding) {
            isHolding = false;
            timerEl.classList.remove('timer-ready');
            const holdDur = Date.now() - startHoldTime;
            
            if (holdDur >= 500) { // Valid hold time
                if (useInspection && !inInspection) {
                    startInspection();
                } else {
                    startTimer();
                }
            }
        }
    }

    function startInspection() {
        inInspection = true;
        inspectionRemaining = 15;
        timerEl.classList.add('timer-inspecting');
        timerEl.textContent = inspectionRemaining;
        
        inspectionInterval = setInterval(() => {
            inspectionRemaining--;
            if (inspectionRemaining > 0) {
                timerEl.textContent = inspectionRemaining;
            } else {
                clearInterval(inspectionInterval);
                timerEl.textContent = "DNF";
                inInspection = false;
            }
        }, 1000);
    }

    function startTimer() {
        if (inInspection) {
            clearInterval(inspectionInterval);
            inInspection = false;
            timerEl.classList.remove('timer-inspecting');
        }
        isRunning = true;
        document.body.classList.add('focus-mode');
        timerEl.classList.add('timer-running');
        solveStartTime = Date.now();
        
        timerInterval = setInterval(() => {
            const diff = Date.now() - solveStartTime;
            timerEl.textContent = (diff / 1000).toFixed(2);
        }, 10);
    }

    function stopTimer() {
        isRunning = false;
        clearInterval(timerInterval);
        document.body.classList.remove('focus-mode');
        timerEl.classList.remove('timer-running');
        
        const finalTime = parseFloat(timerEl.textContent);
        times.push({ event: currentEvent, time: finalTime, date: new Date() });
        
        generateScramble();
        renderHistory();
        updateStats();
    }

    // Stats and History
    function renderHistory() {
        const body = document.getElementById('history-body');
        body.innerHTML = '';
        times.filter(t => t.event === currentEvent).reverse().forEach((s, idx) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td class="p-2">${times.length - idx}</td><td class="p-2 font-bold">${s.time.toFixed(2)}</td><td class="p-2">❌</td>`;
            body.appendChild(tr);
        });
    }

    function updateStats() {
        const curTimes = times.filter(t => t.event === currentEvent).map(s => s.time);
        if (curTimes.length === 0) return;

        const best = Math.min(...curTimes);
        const worst = Math.max(...curTimes);
        document.getElementById('best').textContent = best.toFixed(2);
        document.getElementById('worst').textContent = worst.toFixed(2);
    }

    // Modal and Control Wiring
    settingsBtn.addEventListener('click', () => settingsModal.classList.add('open'));
    closeSettingsBtn.addEventListener('click', () => settingsModal.classList.remove('open'));
    
    toggleInspection.addEventListener('click', () => {
        useInspection = !useInspection;
        toggleInspection.classList.toggle('on', useInspection);
    });

    timerModeSelect.addEventListener('change', (e) => {
        timerMode = e.target.value;
        if (timerMode === 'typing') {
            typingInput.style.display = 'block';
            timerEl.style.display = 'none';
        } else {
            typingInput.style.display = 'none';
            timerEl.style.display = 'block';
        }
    });

    eventSel.addEventListener('change', (e) => {
        currentEvent = e.target.value;
        generateScramble();
        renderHistory();
        updateStats();
    });

    // Keyboard bindings for timer
    window.addEventListener('keydown', (e) => {
        if (e.key === ' ' && timerMode === 'default') {
            e.preventDefault();
            onDown();
        }
    });
    window.addEventListener('keyup', (e) => {
        if (e.key === ' ' && timerMode === 'default') {
            e.preventDefault();
            onUp();
        }
    });

    // Tap/Touch bindings for mobile
    timerContainer.addEventListener('pointerdown', onDown);
    window.addEventListener('pointerup', onUp);

    // Initial Boot
    generateScramble();
    renderHistory();
    updateStats();

    // BACKGROUND EFFECT (Three.JS fallback if not fully loaded)
    try {
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        const geometry = new THREE.BufferGeometry();
        const vertices = [];
        for (let i = 0; i < 5000; i++) {
            vertices.push(THREE.MathUtils.randFloatSpread(2000));
            vertices.push(THREE.MathUtils.randFloatSpread(2000));
            vertices.push(THREE.MathUtils.randFloatSpread(2000));
        }
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
        const material = new THREE.PointsMaterial({ color: 0x67E8F9, size: 2, transparent: true, opacity: 0.5 });
        const points = new THREE.Points(geometry, material);
        scene.add(points);
        camera.position.z = 1000;

        function animate() {
            requestAnimationFrame(animate);
            points.rotation.x += 0.0005;
            points.rotation.y += 0.001;
            renderer.render(scene, camera);
        }
        animate();
    } catch (e) { console.log('ThreeJS issue ignored.'); }
</script>
</body>
</html>
